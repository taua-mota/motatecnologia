name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-motatecnologia-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: mott4a/motatecnologia-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/motatecnologia
            docker compose pull app
            docker compose up -d --remove-orphans
            echo "==> Waiting for motatecnologia-app to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' motatecnologia-app 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "    motatecnologia-app is healthy!"
                exit 0
              fi
              echo "    ($i/30) Status: $STATUS — waiting 5s..."
              sleep 5
            done
            echo "    ERROR: motatecnologia-app did not become healthy in time"
            docker logs --tail 50 motatecnologia-app
            exit 1
